<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Tài Sản Cá Nhân</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f0f0f0; }
    img { width: 80px; height: auto; cursor: pointer; transition: transform 0.2s ease; }
    img:hover { transform: scale(2); z-index: 10; position: relative; }
    select, input { padding: 5px; margin: 5px; }
    .filter-bar { margin-bottom: 15px; }
  </style>
</head>
<body>
  <h2>🗃️ Quản Lý Tài Sản Cá Nhân</h2>

  <div class="filter-bar">
    <label for="categoryFilter">Phân loại:</label>
    <select id="categoryFilter">
      <option value="">Tất cả</option>
    </select>

    <label for="searchInput">Tìm kiếm:</label>
    <input type="text" id="searchInput" placeholder="Nhập từ khóa...">
  </div>

  <table id="itemTable">
    <thead>
      <tr>
        <th>Ảnh</th>
        <th>Tên</th>
        <th>Phân loại</th>
        <th>Ngày mua</th>
        <th>Trạng thái</th>
        <th>Ghi chú</th>
        <th>QR</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const data = [
      {
        name: "Bàn phím Fun60",
        category: "Thiết bị",
        date: "2024-06-15",
        status: "Đang dùng",
        note: "Có LED đỏ",
        image: "https://i.imgur.com/Example1.jpg",
        qr: "https://example.com/fun60"
      },
      {
        name: "Tai nghe X11",
        category: "Thiết bị",
        date: "2024-05-22",
        status: "Hỏng",
        note: "Đứt dây trái",
        image: "https://i.imgur.com/Example2.jpg",
        qr: "https://example.com/x11"
      }
    ];

    const tableBody = document.querySelector('#itemTable tbody');
    const categoryFilter = document.getElementById('categoryFilter');
    const searchInput = document.getElementById('searchInput');

    function renderTable(items) {
      tableBody.innerHTML = '';
      items.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><img src="${item.image}" alt="img"></td>
          <td>${item.name}</td>
          <td>${item.category}</td>
          <td>${item.date}</td>
          <td>${item.status}</td>
          <td>${item.note}</td>
          <td><a href="${item.qr}" target="_blank">🔗 QR</a></td>
        `;
        tableBody.appendChild(row);
      });
    }

    function updateFilter() {
      const category = categoryFilter.value;
      const keyword = searchInput.value.toLowerCase();
      const filtered = data.filter(item => {
        const matchCategory = !category || item.category === category;
        const matchKeyword = item.name.toLowerCase().includes(keyword) || item.note.toLowerCase().includes(keyword);
        return matchCategory && matchKeyword;
      });
      renderTable(filtered);
    }

    function initFilters() {
      const categories = [...new Set(data.map(item => item.category))];
      categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        categoryFilter.appendChild(option);
      });
    }

    categoryFilter.addEventListener('change', updateFilter);
    searchInput.addEventListener('input', updateFilter);

    initFilters();
    renderTable(data);
  </script>
</body>
</html>
