<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Tài Sản Cá Nhân</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>🗃️ Quản Lý Tài Sản Cá Nhân</h2>

  <!-- Thanh lọc và tìm kiếm -->
  <div class="filter-bar">
    <label for="categoryFilter">Phân loại:</label>
    <select id="categoryFilter">
      <option value="">Tất cả</option>
    </select>

    <label for="searchInput">Tìm kiếm:</label>
    <input type="text" id="searchInput" placeholder="Nhập từ khóa...">
  </div>

  <!-- Form thêm tài sản -->
  <h3>➕ Thêm Tài Sản Mới</h3>
  <form id="addForm" autocomplete="off">
    <input type="text" id="newName" placeholder="Tên" required>
    <input type="text" id="newCategory" placeholder="Phân loại" required>
    <input type="date" id="newDate" required>
    <input type="text" id="newStatus" placeholder="Trạng thái" required>
    <input type="text" id="newNote" placeholder="Ghi chú">
    <input type="url" id="newImage" placeholder="Link ảnh (https://...)">
    <button type="submit">Thêm</button>
  </form>

  <!-- Nút export/import JSON -->
  <div style="margin-top: 20px;">
    <button onclick="exportData()">📤 Xuất JSON</button>
    <input type="file" id="importJsonInput" accept=".json">
    <button onclick="importData()">📥 Nhập JSON</button>
  </div>

  <!-- Bảng hiển thị tài sản -->
  <table id="itemTable" style="margin-top: 20px; width: 100%; border-collapse: collapse;">
    <thead>
      <tr>
        <th><input type="checkbox" id="selectAll"></th>
        <th>Ảnh</th>
        <th>Tên</th>
        <th>Phân loại</th>
        <th>Trạng thái</th>
        <th>Ghi chú</th>
        <th>Ngày mua</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- Nút xoá dòng -->
  <div style="margin-top: 20px;">
    <button onclick="deleteSelectedRows()">❌ Xoá các dòng đã chọn</button>
  </div>

  <!-- Dữ liệu và script -->
  <script src="data/items.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
