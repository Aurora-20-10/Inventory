<!-- index.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Tài Sản Cá Nhân</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>🗃️ Quản Lý Tài Sản Cá Nhân</h2>

  <div class="filter-bar">
    <label for="categoryFilter">Phân loại:</label>
    <select id="categoryFilter">
      <option value="">Tất cả</option>
    </select>

    <label for="searchInput">Tìm kiếm:</label>
    <input type="text" id="searchInput" placeholder="Nhập từ khóa...">
  </div>
<h3>➕ Thêm Tài Sản Mới</h3>
<form id="addForm" autocomplete="off">
  <input type="text" id="newName" placeholder="Tên" required autocomplete="off">
  <input type="text" id="newCategory" placeholder="Phân loại" required autocomplete="off">
  <input type="date" id="newDate" required autocomplete="off">
  <input type="text" id="newStatus" placeholder="Trạng thái" required autocomplete="off">
  <input type="text" id="newNote" placeholder="Ghi chú" autocomplete="off">
  <input type="url" id="newImage" placeholder="Link ảnh (https://...)" autocomplete="off">
  <button type="submit">Thêm</button>
</form>

  
  <table id="itemTable">

    <div style="margin-top: 20px;">
  <button onclick="exportData()">📤 Xuất JSON</button>

</div>

    <thead>
      <tr>
        <th>Ảnh</th>
        <th>Tên</th>
        <th>Phân loại</th>
        <th>Trạng thái</th>
        <th>Ghi chú</th>
        <th>Ngày mua</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div id="deleteRowControl" style="margin-top: 20px;">
  <label for="rowIndexInput">Nhập số thứ tự hàng muốn xoá:</label>
  <input type="number" id="rowIndexInput" min="1" placeholder="VD: 1">
  <button onclick="deleteByRowIndex()">❌ Xoá dòng</button>
</div>

  <script src="data/items.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
